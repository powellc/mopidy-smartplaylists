[smartplaylists]
enabled = true
# Comma-separated list of decades to auto-generate playlists for on startup.
# Example: 1960,1970,1980,1990,2000,2010,2020 
# Leave empty to disable auto-generation of decade mixes.
decades = 1960,1970,1980,1990,2000,2010,2020
# Comma-separated list of genres to auto-generate playlists for on startup.
# Example: Jazz,Classical,Rock,Electronic,Hip Hop
# Leave empty to disable auto-generation of genre mixes.
genres = Jazz,Classical,Rock,Electronic,Hip Hop
# Comma-separated list of artists to auto-generate playlists for on startup.
# Leave empty to disable auto-generation of artist mixes.
artists =
# Comma-separated list of artists for full chronological discography playlists.
# Each generates a playlist like "[Smart] Miles Davis - Discography".
artist_discography =
# Prefix used for all smart playlist names
playlist_prefix = [Smart]
# Refresh interval in hours (0 = only on startup)
refresh_interval = 0
# Comma-separated list of URI schemes to restrict searches to.
# Example: local:, file:
# Leave empty to search all backends.
search_uris = local:
# Directory to write .m3u8 playlist files into (e.g. for mopidy-m3u).
# Leave empty to use Mopidy's core.playlists.save() API instead.
playlist_dir =
# Maximum number of tracks per generated playlist (0 = no limit)
max_tracks = 75
# Maximum tracks per album in a mix (0 = no limit)
max_per_album = 2
# Maximum tracks per artist in a mix (0 = no limit)
max_per_artist = 4
# Dynamically refill the playback queue with similar tracks
smart_queue_enabled = false
# Refill when queue drops below this many tracks
smart_queue_min_tracks = 5
# Refill until queue reaches this many tracks
smart_queue_refill_to = 15
# Skip this many track_playback_started events after a refill
smart_queue_cooldown = 3
# Don't repeat tracks from the last N played
smart_queue_dedup = 50
# Fraction of refill tracks that are cross-genre/decade variety
smart_queue_variety = 0.15
